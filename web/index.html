<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Osama Kamel - Flutter Developer Portfolio">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Osama Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Osama Kamel | Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload Google Font for the loader -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #F5F7FB;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* === Loading Screen === */
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: #F5F7FB;
    }

    /* Animated initials badge */
    .loader-badge {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1E6FFF 0%, #4ADE80 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      animation: badgePulse 2s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(30, 111, 255, 0.25), 0 0 80px rgba(30, 111, 255, 0.12);
    }

    @keyframes badgePulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 40px rgba(30, 111, 255, 0.25), 0 0 80px rgba(30, 111, 255, 0.12);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 60px rgba(30, 111, 255, 0.35), 0 0 100px rgba(30, 111, 255, 0.18);
      }
    }

    /* Name text */
    .loader-name {
      margin-top: 24px;
      font-size: 18px;
      font-weight: 600;
      color: #1E293B;
      letter-spacing: 0.5px;
    }

    .loader-subtitle {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 400;
      color: #64748B;
      letter-spacing: 0.3px;
    }

    /* Progress bar */
    .loader-progress-track {
      margin-top: 32px;
      width: 200px;
      height: 3px;
      background: #E2E8F0;
      border-radius: 4px;
      overflow: hidden;
    }

    .loader-progress-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #1E6FFF, #4ADE80);
      border-radius: 4px;
      animation: progressSlide 1.5s ease-in-out infinite;
    }

    @keyframes progressSlide {
      0% {
        transform: translateX(-100%);
        width: 30%;
      }

      50% {
        width: 60%;
      }

      100% {
        transform: translateX(700%);
        width: 30%;
      }
    }

    /* Fade-out animation when Flutter is ready */
    .loading-screen.fade-out {
      opacity: 0;
      transition: opacity 0.4s ease-out;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Lightweight CSS-only loading screen (no images to download) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loader-badge">OK</div>
    <div class="loader-name">Osama Kamel</div>
    <div class="loader-subtitle">Loading portfolio...</div>
    <div class="loader-progress-track">
      <div class="loader-progress-bar"></div>
    </div>
  </div>

  <script>
    // Remove loading screen when Flutter signals it's ready
    function removeLoadingScreen() {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(() => loader.remove(), 400);
      }
    }
  </script>

  <script src="flutter_bootstrap.js" async=""></script>
</body>

</html>
